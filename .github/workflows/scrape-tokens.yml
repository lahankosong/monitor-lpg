name: Scrape MyPertamina Tokens

on:
  # Jadwal otomatis (WIB = UTC+7)
  schedule:
    # Setiap hari jam 06:00 WIB (23:00 UTC hari sebelumnya)
    - cron: '0 23 * * *'
    # Setiap hari jam 18:00 WIB (11:00 UTC)
    - cron: '0 11 * * *'

  # Manual trigger
  workflow_dispatch:
    inputs:
      date_from:
        description: 'Tanggal mulai (YYYY-MM-DD)'
        required: false
        default: ''
      date_to:
        description: 'Tanggal akhir (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright aiohttp
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          LARAVEL_API_URL: ${{ secrets.LARAVEL_API_URL }}
          LARAVEL_API_KEY: ${{ secrets.LARAVEL_API_KEY }}
          # Credentials pangkalan diambil otomatis dari database via API.
          # ACCOUNTS_BASE64 / ACCOUNTS_JSON tidak diperlukan lagi.
          DATE_FROM: ${{ github.event.inputs.date_from }}
          DATE_TO: ${{ github.event.inputs.date_to }}
        run: |
          cd scripts
          python scrape_for_actions.py
